<form action="#" method="POST" class="contact-form">
  <div class="form-group">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" placeholder="Ihr Name" required>
  </div>
  <div class="form-group">
    <label for="email">E-Mail</label>
    <input type="email" id="email" name="email" placeholder="ihre@email.de" required>
  </div>
  <div class="form-group">
    <label for="subject">Betreff</label>
    <input type="text" id="subject" name="subject" placeholder="Worum geht es?">
  </div>
  <div class="form-group">
    <label for="message">Nachricht</label>
    <textarea id="message" name="message" rows="6" placeholder="Beschreiben Sie Ihr Projekt oder Ihre Frage…"
      required></textarea>
  </div>
  <button type="submit" class="btn btn--primary" disabled>Nachricht senden</button>
  <p class="contact-note">Kontaktformular wird in Kürze aktiviert. Bis dahin erreichen Sie mich über <a href="https://github.com/jozzox">GitHub</a>.</p>
</form>
