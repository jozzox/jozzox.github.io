<header class="site-header">
  <div class="container">
    <a class="site-logo" href="{{ '/' | relative_url }}">
      <span class="logo-mark" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="28" height="28" rx="6" fill="#141413"/>
          <text x="14" y="20" text-anchor="middle"
                font-family="system-ui,-apple-system,sans-serif"
                font-size="17" font-weight="800" fill="#faf9f5">j</text>
        </svg>
      </span>
      <span class="logo-text">jozzox</span>
    </a>
    <button class="nav-toggle" aria-label="Navigation öffnen"
            aria-expanded="false" aria-controls="site-nav">
      <span class="nav-toggle__bar"></span>
      <span class="nav-toggle__bar"></span>
      <span class="nav-toggle__bar"></span>
    </button>

    <nav class="site-nav" id="site-nav" aria-label="Hauptnavigation">
      <a href="{{ '/' | relative_url }}" class="nav-link{% if page.url == '/' %} active{% endif %}">Start</a>
      <a href="{{ '/projekte/' | relative_url }}" class="nav-link{% if page.url contains '/projekte' %} active{% endif %}">Projekte</a>
      <a href="{{ '/blog/' | relative_url }}" class="nav-link{% if page.url contains '/blog' %} active{% endif %}">Blog</a>
      <a href="{{ '/about/' | relative_url }}" class="nav-link{% if page.url contains '/about' %} active{% endif %}">Über mich</a>
      <a href="{{ '/kontakt/' | relative_url }}" class="nav-link nav-link--cta">Kontakt</a>
    </nav>
  </div>
</header>
