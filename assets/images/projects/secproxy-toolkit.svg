<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <!-- Background -->
  <rect width="1200" height="675" fill="#141413"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#faf9f5" stroke-width="0.3" opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#grid)"/>

  <!-- Accent glow -->
  <circle cx="600" cy="275" r="200" fill="#d97757" opacity="0.06"/>

  <!-- Shield icon (centered, large) -->
  <!-- Shield path: centered at 600,270 -->
  <path d="M 600 120
           L 740 170
           V 285
           C 740 355 680 410 600 440
           C 520 410 460 355 460 285
           V 170 Z"
        fill="none" stroke="#d97757" stroke-width="4" opacity="0.9"/>

  <!-- Shield inner fill -->
  <path d="M 600 135
           L 726 181
           V 284
           C 726 348 671 400 600 428
           C 529 400 474 348 474 284
           V 181 Z"
        fill="#d97757" opacity="0.12"/>

  <!-- Lock icon inside shield -->
  <!-- Lock body -->
  <rect x="566" y="280" width="68" height="52" rx="6" fill="#d97757" opacity="0.9"/>
  <!-- Lock shackle -->
  <path d="M 578 280 V 258 C 578 238 622 238 622 258 V 280" fill="none" stroke="#d97757" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <!-- Keyhole -->
  <circle cx="600" cy="305" r="8" fill="#141413"/>
  <rect x="596" y="305" width="8" height="14" rx="2" fill="#141413"/>

  <!-- Network lines (proxy concept) -->
  <line x1="330" y1="220" x2="460" y2="270" stroke="#d97757" stroke-width="1.5" opacity="0.3" stroke-dasharray="6,4"/>
  <line x1="330" y1="320" x2="460" y2="285" stroke="#d97757" stroke-width="1.5" opacity="0.3" stroke-dasharray="6,4"/>
  <line x1="740" y1="270" x2="870" y2="220" stroke="#d97757" stroke-width="1.5" opacity="0.3" stroke-dasharray="6,4"/>
  <line x1="740" y1="285" x2="870" y2="320" stroke="#d97757" stroke-width="1.5" opacity="0.3" stroke-dasharray="6,4"/>

  <!-- Left nodes -->
  <circle cx="320" cy="218" r="12" fill="#d97757" opacity="0.4"/>
  <circle cx="320" cy="322" r="12" fill="#d97757" opacity="0.4"/>
  <!-- Right nodes -->
  <circle cx="880" cy="218" r="12" fill="#d97757" opacity="0.4"/>
  <circle cx="880" cy="322" r="12" fill="#d97757" opacity="0.4"/>

  <!-- Bottom: Title and tags -->
  <text x="600" y="510" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#faf9f5" text-anchor="middle" letter-spacing="-0.5">SecProxy Toolkit</text>

  <!-- Tags -->
  <rect x="376" y="530" width="84" height="28" rx="14" fill="#d97757" opacity="0.25"/>
  <text x="418" y="549" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#d97757" text-anchor="middle" font-weight="600">Security</text>

  <rect x="472" y="530" width="72" height="28" rx="14" fill="#d97757" opacity="0.25"/>
  <text x="508" y="549" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#d97757" text-anchor="middle" font-weight="600">Pentest</text>

  <rect x="556" y="530" width="50" height="28" rx="14" fill="#d97757" opacity="0.25"/>
  <text x="581" y="549" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#d97757" text-anchor="middle" font-weight="600">ARM</text>

  <rect x="618" y="530" width="46" height="28" rx="14" fill="#d97757" opacity="0.25"/>
  <text x="641" y="549" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#d97757" text-anchor="middle" font-weight="600">Kali</text>

  <rect x="676" y="530" width="56" height="28" rx="14" fill="#d97757" opacity="0.25"/>
  <text x="704" y="549" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#d97757" text-anchor="middle" font-weight="600">Proxy</text>

  <!-- Bottom accent line -->
  <rect x="0" y="665" width="1200" height="10" fill="#d97757"/>
</svg>
